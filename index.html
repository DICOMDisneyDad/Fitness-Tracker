<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fitness">
<meta name="theme-color" content="#0f1117">
<title>Fitness Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222535;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --muted: #6b7280;
    --accent: #4ade80;
    --accent-dim: rgba(74,222,128,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --amber: #fbbf24;
    --radius: 14px;
    --pad: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 32px;
  }

  /* Header */
  .header {
    padding: 56px var(--pad) 20px;
    background: linear-gradient(180deg, #131620 0%, var(--bg) 100%);
  }
  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .header-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  .header-meta {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    animation: pulse 2.5s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Loading / Error */
  .state-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 12px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--surface2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* KPI row */
  .kpi-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 0 var(--pad) 4px;
    scrollbar-width: none;
    margin-bottom: 24px;
  }
  .kpi-scroll::-webkit-scrollbar { display: none; }
  .kpi {
    flex: 0 0 auto;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    min-width: 130px;
  }
  .kpi-label { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
  .kpi-value { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
  .kpi-delta { font-size: 12px; margin-top: 3px; font-weight: 500; }
  .good { color: var(--accent); }
  .bad { color: var(--red); }
  .neutral { color: var(--muted); }

  /* Insight banner */
  .insight {
    margin: 0 var(--pad) 24px;
    background: var(--accent-dim);
    border: 0.5px solid rgba(74,222,128,0.25);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 13px;
    color: var(--accent);
    line-height: 1.55;
  }

  /* Section */
  .section { margin-bottom: 28px; }
  .section-header {
    padding: 0 var(--pad) 12px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .section-title { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .section-sub { font-size: 12px; color: var(--muted); }

  /* Card */
  .card {
    margin: 0 var(--pad);
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    overflow: hidden;
  }
  .chart-wrap { position: relative; width: 100%; }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 14px;
    font-size: 12px;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-line { width: 18px; height: 2px; border-radius: 1px; flex-shrink: 0; }

  /* Tabs */
  .tab-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 0 var(--pad) 12px;
    scrollbar-width: none;
  }
  .tab-scroll::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active {
    background: var(--accent-dim);
    border-color: rgba(74,222,128,0.35);
    color: var(--accent);
  }

  /* Threshold line label */
  .threshold-note {
    font-size: 11px;
    color: var(--amber);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .threshold-dash { width: 18px; height: 2px; background: var(--amber); border-radius: 1px; display: inline-block; }

  /* Last updated */
  .last-updated {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 32px;
    padding: 0 var(--pad);
  }

  @media (prefers-reduced-motion: reduce) {
    .spinner, .status-dot { animation: none; }
  }
</style>
</head>
<body>

<div id="loading" class="state-screen">
  <div class="spinner"></div>
  <span>Loading your data…</span>
</div>

<div id="error" class="state-screen" style="display:none">
  <span style="font-size:28px">⚠️</span>
  <span id="error-msg">Could not load data.</span>
  <button onclick="loadData()" style="margin-top:8px;padding:8px 20px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;">Retry</button>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="header-eyebrow">Progress</div>
    <div class="header-title">Fitness tracker</div>
    <div class="header-meta">
      <span class="status-dot"></span>
      <span id="date-range">Loading…</span>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-scroll" id="kpi-row"></div>

  <!-- Insight -->
  <div class="insight" id="insight-text"></div>

  <!-- Weight -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Total weight</span>
      <span class="section-sub" id="weight-range-label"></span>
    </div>
    <div class="card">
      <div class="legend">
        <span class="legend-item"><span class="legend-line" style="background:var(--blue)"></span>Weight (lbs)</span>
      </div>
      <div class="chart-wrap" style="height:200px">
        <canvas id="c-weight" role="img" aria-label="Weight over time"></canvas>
      </div>
    </div>
  </div>

  <!-- Body fat -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Body fat %</span>
      <span class="section-sub" id="bf-range-label"></span>
    </div>
    <div class="card">
      <div class="threshold-note"><span class="threshold-dash"></span>22% optimal ceiling</div>
      <div class="chart-wrap" style="height:200px">
        <canvas id="c-bf" role="img" aria-label="Body fat percentage over time"></canvas>
      </div>
    </div>
  </div>

  <!-- Fat vs Lean -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Fat vs. lean mass</span>
    </div>
    <div class="card">
      <div class="legend">
        <span class="legend-item"><span class="legend-swatch" style="background:var(--red)"></span>Fat mass (lbs)</span>
        <span class="legend-item"><span class="legend-swatch" style="background:var(--accent)"></span>Lean mass (lbs)</span>
      </div>
      <div class="chart-wrap" style="height:220px">
        <canvas id="c-comp" role="img" aria-label="Fat mass vs lean mass over time"></canvas>
      </div>
    </div>
  </div>

  <!-- Cumulative -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Cumulative progress</span>
    </div>
    <div class="card">
      <div class="legend">
        <span class="legend-item"><span class="legend-swatch" style="background:var(--red);opacity:0.75"></span>Fat lost (lbs)</span>
        <span class="legend-item"><span class="legend-swatch" style="background:var(--accent);opacity:0.75"></span>Lean gained (lbs)</span>
      </div>
      <div class="chart-wrap" style="height:220px">
        <canvas id="c-cum" role="img" aria-label="Cumulative fat lost and lean mass gained"></canvas>
      </div>
    </div>
  </div>

  <!-- Measurements -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Body measurements</span>
      <span class="section-sub">inches</span>
    </div>
    <div class="tab-scroll" id="meas-tabs"></div>
    <div class="card">
      <div class="chart-wrap" style="height:200px">
        <canvas id="c-meas" role="img" aria-label="Body measurement over time"></canvas>
      </div>
    </div>
  </div>

  <!-- Skinfolds -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Skinfold sum</span>
      <span class="section-sub">7-site total (mm)</span>
    </div>
    <div class="card">
      <div class="chart-wrap" style="height:200px">
        <canvas id="c-skin" role="img" aria-label="Sum of skinfolds over time"></canvas>
      </div>
    </div>
  </div>

  <div class="last-updated" id="last-updated"></div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSy_3M51S_7n-_x2r2OSypiuYGy-ld0k3Fwj3wQQdgk66rfX2ulSSIzK7cTRWSRYi_O3B3-Iw_m1nRP/pub?gid=0&single=true&output=csv';

// Fallback data (last known good — updates from live sheet when available)
const FALLBACK = {
  dates: ['9/27','10/7','11/11','11/24','1/3','1/20','2/3','2/14','2/28','3/30','4/25','5/12','6/6','6/20'],
  weight: [221,216,222,223,233,226,225,228,229,228,229,234,221,216],
  bfPct:  [25.09,22.58,22.94,22.46,23.52,22.82,22.94,21.74,23.05,23.63,22.82,21.74,20.88,20.50],
  fatMass:[55.4,48.8,50.9,50.1,54.8,51.6,51.6,49.6,52.8,53.9,52.3,50.9,46.1,44.3],
  leanMass:[165.6,167.2,171.1,172.9,178.2,174.4,173.4,178.4,176.2,174.1,176.7,183.1,174.9,171.7],
  cumFat: [0,6.67,4.53,5.36,0.65,3.88,3.84,5.88,2.65,1.56,3.19,4.58,9.31,11.17],
  cumLean:[0,1.67,5.53,7.36,12.65,8.88,7.84,12.88,10.65,8.56,11.19,17.58,9.31,6.17],
  skinfolds:[178,156,159,155,164,158,159,149,160,165,158,149,142,139],
  measurements: {
    'Abdominal':[44.5,43.5,44,41,45,43,44,45,44,43,45.5,45,43.5,42.5],
    'Hips':     [47,46,47,45,47,47,46.25,46.5,46.5,46,46,47,45.5,45.25],
    'Chest':    [44,42.5,43.5,41.5,44,44.5,44,45,44,43,44.5,45,44,42.5],
    'Shoulders':[47.25,44,46.5,45,48,47.25,49.75,49,47,47,48.5,50,48.5,46],
    'Thigh':    [25.5,24,27,22.5,25,26,25.75,26,26,25,25.5,25.5,25.5,24],
    'Biceps':   [15,15,15.5,15,15.5,15.25,15.5,15.25,15.25,15,15.75,15.75,15,15.25],
    'Neck':     [16.5,16,16,15.75,16.5,16.25,16.25,16,16,16,16,16.5,16.25,15.75]
  }
};

function parseCSV(text) {
  const lines = text.trim().split('\n').map(l => l.split(',').map(c => c.replace(/^"|"$/g,'').trim()));
  const findRow = (key) => lines.find(r => r[0] && r[0].toLowerCase().includes(key.toLowerCase()));
  const getVals = (row) => row ? row.slice(1).map(v => parseFloat(v.replace(/[()%]/g,''))).filter((v,i,a) => !isNaN(v) && a[i] !== 0 || i === 0) : [];

  const dateRow = findRow('Date');
  const dates = dateRow ? dateRow.slice(1).filter(d => d && !d.match(/^0/) && d.length > 0 && !isNaN(Date.parse(d.replace(/(\d+)\/(\d+)\/(\d+)/,'$3/$1/$2')))).map(d => {
    const p = d.replace(/-/g,'/').replace(/(\d{4})/,'').trim();
    const m = d.match(/(\d+)[\/\-](\d+)[\/\-]?(\d{2,4})?/);
    return m ? `${m[1]}/${m[2]}` : d;
  }) : FALLBACK.dates;

  const weightRow = findRow('Total Weight');
  const bfRow = findRow('Body Fat Percentage');
  const fatRow = findRow('Fat Mass');
  const leanRow = findRow('Lean Mass');
  const cumFatRow = findRow('Cumulative Fat Loss');
  const cumLeanRow = findRow('Cumulative Lean Mass');
  const skinRow = findRow('Sum of Skinfolds');

  const measKeys = ['Neck','Biceps','Chest','Shoulders','Abdominal','Hips','Thigh'];
  const measurements = {};
  measKeys.forEach(k => {
    const r = findRow(k);
    if (r) measurements[k] = r.slice(1).map(v => parseFloat(v)).filter(v => !isNaN(v) && v > 0);
  });

  return {
    dates: dates.length > 0 ? dates : FALLBACK.dates,
    weight: weightRow ? getVals(weightRow) : FALLBACK.weight,
    bfPct: bfRow ? getVals(bfRow) : FALLBACK.bfPct,
    fatMass: fatRow ? getVals(fatRow) : FALLBACK.fatMass,
    leanMass: leanRow ? getVals(leanRow) : FALLBACK.leanMass,
    cumFat: cumFatRow ? getVals(cumFatRow) : FALLBACK.cumFat,
    cumLean: cumLeanRow ? getVals(cumLeanRow) : FALLBACK.cumLean,
    skinfolds: skinRow ? getVals(skinRow) : FALLBACK.skinfolds,
    measurements: Object.keys(measurements).length > 0 ? measurements : FALLBACK.measurements
  };
}

const chartInstances = {};
function makeChart(id, config) {
  if (chartInstances[id]) chartInstances[id].destroy();
  chartInstances[id] = new Chart(document.getElementById(id), config);
  return chartInstances[id];
}

const GRID = 'rgba(255,255,255,0.06)';
const TICK = '#4b5563';
const baseOpts = (min, max, cb) => ({
  responsive: true, maintainAspectRatio: false, animation: { duration: 600 },
  plugins: { legend: { display: false }, tooltip: {
    backgroundColor: '#1e2130', titleColor: '#9ca3af', bodyColor: '#f0f0f0',
    borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, padding: 10,
    callbacks: cb ? { label: cb } : {}
  }},
  scales: {
    x: { grid: { color: GRID }, ticks: { color: TICK, font: { size: 10 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 8 }},
    y: { min, max, grid: { color: GRID }, ticks: { color: TICK, font: { size: 10 }}}
  }
});

function lineDs(data, color, fill=true) {
  return { data, borderColor: color, backgroundColor: color.replace(')',',0.12)').replace('rgb','rgba'), borderWidth: 2, pointRadius: 3.5, pointBackgroundColor: color, tension: 0.35, fill };
}

let activeMeas = 'Abdominal';
let currentData = null;

function buildUI(d) {
  currentData = d;
  const n = d.dates.length;
  const trimTo = (arr) => arr.slice(0, n);

  const weight = trimTo(d.weight);
  const bfPct = trimTo(d.bfPct);
  const fatMass = trimTo(d.fatMass);
  const leanMass = trimTo(d.leanMass);
  const cumFat = trimTo(d.cumFat);
  const cumLean = trimTo(d.cumLean);
  const skinfolds = trimTo(d.skinfolds);

  // Header meta
  document.getElementById('date-range').textContent = `${d.dates[0]} – ${d.dates[n-1]} · ${n} measurements`;

  // KPIs
  const startW = weight[0], endW = weight[n-1];
  const startBF = bfPct[0], endBF = bfPct[n-1];
  const totalFatLost = cumFat[n-1];
  const totalLeanGain = cumLean[n-1];
  const kpis = [
    { label: 'Current weight', value: `${endW} lbs`, delta: `${endW < startW ? '↓' : '↑'} ${Math.abs(endW-startW).toFixed(1)} lbs`, good: endW <= startW },
    { label: 'Body fat %', value: `${endBF.toFixed(1)}%`, delta: `↓ ${(startBF-endBF).toFixed(1)}% from ${startBF.toFixed(1)}%`, good: true },
    { label: 'Fat lost', value: `${totalFatLost.toFixed(1)} lbs`, delta: 'Cumulative', good: true },
    { label: 'Lean gained', value: `+${totalLeanGain.toFixed(1)} lbs`, delta: 'Cumulative', good: true },
    { label: 'Starting weight', value: `${startW} lbs`, delta: d.dates[0], good: null }
  ];
  document.getElementById('kpi-row').innerHTML = kpis.map(k => `
    <div class="kpi">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-delta ${k.good === null ? 'neutral' : k.good ? 'good' : 'bad'}">${k.delta}</div>
    </div>`).join('');

  // Insight
  document.getElementById('insight-text').textContent =
    `You've lost ${totalFatLost.toFixed(1)} lbs of fat while gaining ${totalLeanGain.toFixed(1)} lbs of lean mass — a body recomposition. Body fat has dropped from ${startBF.toFixed(1)}% to ${endBF.toFixed(1)}%, approaching the optimal 10–22% range.`;

  // Weight range label
  const minW = Math.min(...weight), maxW = Math.max(...weight);
  document.getElementById('weight-range-label').textContent = `${minW}–${maxW} lbs`;
  document.getElementById('bf-range-label').textContent = `${Math.min(...bfPct).toFixed(1)}–${Math.max(...bfPct).toFixed(1)}%`;

  // Charts
  makeChart('c-weight', {
    type: 'line',
    data: { labels: d.dates, datasets: [lineDs(weight, '#60a5fa')] },
    options: baseOpts(Math.min(...weight)-3, Math.max(...weight)+3, v => ` ${v.formattedValue} lbs`)
  });

  makeChart('c-bf', {
    type: 'line',
    data: { labels: d.dates, datasets: [
      lineDs(bfPct, '#fbbf24'),
      { data: Array(n).fill(22), borderColor: 'rgba(251,191,36,0.4)', borderWidth: 1.5, borderDash: [5,4], pointRadius: 0, fill: false }
    ]},
    options: baseOpts(Math.min(...bfPct)-1, Math.max(...bfPct)+1, v => ` ${v.formattedValue}%`)
  });

  makeChart('c-comp', {
    type: 'line',
    data: { labels: d.dates, datasets: [
      { ...lineDs(fatMass, '#f87171'), yAxisID: 'y' },
      { ...lineDs(leanMass, '#4ade80'), yAxisID: 'y2' }
    ]},
    options: {
      responsive: true, maintainAspectRatio: false, animation: { duration: 600 },
      plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1e2130', titleColor: '#9ca3af', bodyColor: '#f0f0f0', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, padding: 10 }},
      scales: {
        x: { grid: { color: GRID }, ticks: { color: TICK, font: { size: 10 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 8 }},
        y: { position: 'left', min: Math.min(...fatMass)-3, max: Math.max(...fatMass)+3, grid: { color: GRID }, ticks: { color: '#f87171', font: { size: 10 }}},
        y2: { position: 'right', min: Math.min(...leanMass)-3, max: Math.max(...leanMass)+3, grid: { display: false }, ticks: { color: '#4ade80', font: { size: 10 }}}
      }
    }
  });

  makeChart('c-cum', {
    type: 'bar',
    data: { labels: d.dates, datasets: [
      { data: cumFat, backgroundColor: 'rgba(248,113,113,0.7)', borderRadius: 3, borderSkipped: false, barPercentage: 0.65, categoryPercentage: 0.7 },
      { data: cumLean, backgroundColor: 'rgba(74,222,128,0.7)', borderRadius: 3, borderSkipped: false, barPercentage: 0.65, categoryPercentage: 0.7 }
    ]},
    options: baseOpts(0, Math.max(...cumFat, ...cumLean)+2)
  });

  // Measurement tabs
  const measKeys = Object.keys(d.measurements);
  if (!measKeys.includes(activeMeas)) activeMeas = measKeys[0];
  const tabContainer = document.getElementById('meas-tabs');
  tabContainer.innerHTML = measKeys.map(k =>
    `<button class="tab ${k === activeMeas ? 'active' : ''}" data-k="${k}">${k}</button>`
  ).join('');
  tabContainer.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeMeas = btn.dataset.k;
      tabContainer.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateMeasChart(d);
    });
  });
  updateMeasChart(d);

  makeChart('c-skin', {
    type: 'line',
    data: { labels: d.dates, datasets: [lineDs(skinfolds, '#a78bfa')] },
    options: baseOpts(Math.min(...skinfolds)-5, Math.max(...skinfolds)+5, v => ` ${v.formattedValue} mm`)
  });

  document.getElementById('last-updated').textContent = `Last fetched: ${new Date().toLocaleString()}`;
}

function updateMeasChart(d) {
  const data = d.measurements[activeMeas] || [];
  const labels = d.dates.slice(0, data.length);
  makeChart('c-meas', {
    type: 'line',
    data: { labels, datasets: [lineDs(data, '#60a5fa')] },
    options: baseOpts(Math.min(...data)-0.5, Math.max(...data)+0.5, v => ` ${v.formattedValue}"`)
  });
}

async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('error').style.display = 'none';
  document.getElementById('app').style.display = 'none';

  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('Network error');
    const text = await res.text();
    const parsed = parseCSV(text);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    buildUI(parsed);
  } catch(e) {
    // Use fallback data with a notice
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    buildUI(FALLBACK);
    document.getElementById('last-updated').textContent = `Using cached data (live fetch unavailable) · ${new Date().toLocaleString()}`;
  }
}

loadData();
</script>
</body>
</html>
